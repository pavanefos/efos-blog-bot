name: EFOS Blog Automation
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      LARAVEL_API_URL: ${{ secrets.LARAVEL_API_URL }}
      AI_BLOG_TOKEN: ${{ secrets.AI_BLOG_TOKEN }}
      AI_MODEL: openrouter/free
      AI_MAX_TOKENS: '512'
      AI_FALLBACK_MODELS: google/gemma-4-26b-a4b-it:free,openai/gpt-oss-20b:free
      BLOGS_PER_DAY: '1'
      USE_IMAGE_API: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests feedparser requests_toolbelt
      - run: |
          mkdir -p src
          for f in __init__.py __main__.py ai_client.py config.py knowledge.py logger.py pipeline.py publisher.py state.py topics.py writer.py image.py; do
            if [ -f "$f" ]; then mv "$f" src/; fi
          done
      - run: python run.py --once
